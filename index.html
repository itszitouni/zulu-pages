<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Rewards - Earn Rewards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a192f;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .countdown {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .cta {
            background-color: #64ffda;
            color: #0a192f;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .cta:hover {
            background-color: #56ffd3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tap Rewards - Earn Rewards</h1>
        <p>earn rewards now!</p>
        <div class="countdown" id="countdown">05:00</div>
        <button class="cta" onclick="window.location.href='https://mob.v8trck.com/click?pid=2&offer_id=17183&sub2=u168235&sub7=rfnull&sub8=rdnull&sub15=fe8454c8ea2e'">Get Rewards</button>
    </div>
    
    <script>
        let countdown = 300; // 5 minutes in seconds
        const countdownElement = document.getElementById('countdown');
        
        setInterval(() => {
            let minutes = Math.floor(countdown / 60);
            let seconds = countdown % 60;
            countdownElement.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            countdown--;
            if (countdown < 0) {
                countdown = 0;
                countdownElement.textContent = '00:00';
            }
        }, 1000);
    </script>
</body>
</html>
